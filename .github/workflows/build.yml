name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # `prisma generate` and prisma.config.ts require DATABASE_URL. This job does not start Postgres
      # and does not run migrations; next build must not query the DB. Value is a valid-format dummy only.
      DATABASE_URL: postgresql://unused:unused@127.0.0.1:5432/unused
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Typecheck standalone API
        run: pnpm run api:typecheck

      - name: Build
        run: pnpm run build
