name: Changesets Version On Main

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: changesets-version-main
  cancel-in-progress: false

jobs:
  version:
    # Skip only when this workflow's own version commit triggered the run (avoids loop).
    # Using commit message instead of actor so versioning runs even when merges are done by bot/app.
    if: ${{ !github.event.head_commit || !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Apply changesets versioning
        run: pnpm run changeset:version

      - name: Commit generated changelog and version updates
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No versioning changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: version packages [skip ci]"
          git push
